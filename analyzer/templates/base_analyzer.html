<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motor Estadístico</title>

    <!--
        PASO 1: Aplicar la clase 'dark' al <html> ANTES de que el navegador pinte
        nada, para evitar el parpadeo de tema incorrecto.
        Este script NO necesita Tailwind, solo opera el DOM.
    -->
    <script>
        (function () {
            try {
                var saved = localStorage.getItem('theme');
                if (saved === 'dark') {
                    document.documentElement.classList.add('dark');
                } else if (saved === 'light') {
                    document.documentElement.classList.remove('dark');
                } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    document.documentElement.classList.add('dark');
                }
            } catch (e) {}
        })();
    </script>

    <!--
        PASO 2: Cargar el CDN de Tailwind.
    -->
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>

    <!--
        PASO 3: Configurar Tailwind DESPUÉS de que el CDN se cargó.
        Esto es lo que el CDN espera: que tailwind.config se asigne aquí.
        darkMode: 'class' hace que los estilos dark: dependan de la clase 'dark'
        en el elemento <html>, no de la preferencia del SO.
    -->
    <script>
        tailwind.config = {
            darkMode: 'class'
        };
    </script>

    <style>
        .hidden {
            display: none !important;
        }

        /* Smooth Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        /* Smooth theme transition */
        body, body * {
            transition: background-color 0.25s ease, border-color 0.25s ease, color 0.15s ease;
        }

        /* Theme toggle hover animation */
        #themeToggle svg {
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        #themeToggle:hover svg {
            transform: rotate(20deg) scale(1.15);
        }
    </style>
</head>

<body class="bg-[radial-gradient(circle_at_top_left,_#e0f2fe,_#f8fafc,_#f5f3ff)] dark:bg-[radial-gradient(circle_at_top_left,_#0f172a,_#1e1b4b,_#0f172a)] min-h-screen antialiased text-slate-800 dark:text-slate-100">

    <!-- Dark Mode Toggle Button (Fixed Top Right) -->
    <button id="themeToggle" title="Cambiar tema"
        class="fixed top-4 right-4 z-50 p-3 rounded-2xl bg-white/80 dark:bg-slate-800/80 backdrop-blur-md border border-white/60 dark:border-slate-700/60 shadow-lg shadow-indigo-500/10 dark:shadow-indigo-900/30 text-slate-600 dark:text-yellow-300 hover:bg-white dark:hover:bg-slate-700 transition-all duration-300">
        <!-- Sol (visible solo en modo oscuro) -->
        <svg id="iconSun" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707.707M6.343 6.343l-.707.707M12 8a4 4 0 100 8 4 4 0 000-8z" />
        </svg>
        <!-- Luna (visible solo en modo claro) -->
        <svg id="iconMoon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
        </svg>
    </button>

    <div class="max-w-5xl w-full mx-auto sm:px-6 lg:px-8 pt-10">
        <!-- Header -->
        <div class="mb-10 text-center transition-all">
            <h1 class="text-6xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-blue-600 via-indigo-600 to-purple-600 drop-shadow-sm mb-3">Analizador Estadístico</h1>
            <p class="text-slate-500 dark:text-slate-400 text-sm font-medium pb-2">Carga tus documentos y obtén estadísticas precisas con una interfaz limpia.</p>
        </div>

        {% block content %}
        {% endblock %}
    </div>

    <!-- Toggle Script — al final del body, cuando el DOM ya existe -->
    <script>
        (function () {
            var toggle    = document.getElementById('themeToggle');
            var iconSun   = document.getElementById('iconSun');
            var iconMoon  = document.getElementById('iconMoon');

            function applyIcons(isDark) {
                if (isDark) {
                    iconSun.style.display  = 'block';
                    iconMoon.style.display = 'none';
                } else {
                    iconSun.style.display  = 'none';
                    iconMoon.style.display = 'block';
                }
            }

            // Sincronizar íconos con el estado actual del <html>
            applyIcons(document.documentElement.classList.contains('dark'));

            toggle.addEventListener('click', function () {
                var html   = document.documentElement;
                var isDark = html.classList.contains('dark');

                if (isDark) {
                    html.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                } else {
                    html.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                }

                applyIcons(!isDark);
            });
        })();
    </script>
</body>

</html>
